[build]
  base = "site"
  publish = "public"
  command = "hugo"

[build.environment]
  HUGO_VERSION = "0.153.0"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/.well-known/nostr.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
